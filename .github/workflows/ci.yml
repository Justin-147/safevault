name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,ui,tray]"
      - run: bash scripts/release_check.sh
      - run: bash scripts/gui_smoke.sh
      - uses: actions/upload-artifact@v4
        with:
          name: safevault-dist
          path: dist/*

  macos-symlink:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,ui]"
      - run: pytest -q tests/test_symlink_security.py tests/test_e2e.py
      - run: python -m safevault daemon run --test-once

  windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,ui,tray]"
      - run: pytest -q tests/test_cli.py tests/test_object_store.py tests/test_diffing.py tests/test_apply_tamper_resistance.py tests/test_import.py
      - run: python -m safevault --help
      - run: python -m safevault --version
      - run: powershell -ExecutionPolicy Bypass -File scripts\auto_protect_smoke.ps1
      - run: powershell -ExecutionPolicy Bypass -File scripts\daemon_smoke.ps1
      - run: python -m safevault tray --check
