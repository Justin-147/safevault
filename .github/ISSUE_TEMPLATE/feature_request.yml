name: Feature request
description: Suggest a focused improvement to SafeVault
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful solution and how a user would interact with it.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and data impact
      description: Could this overwrite, delete, expose, or move user data? Explain the safeguards you expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
