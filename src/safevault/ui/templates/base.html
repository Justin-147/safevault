<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafeVault 恢复中心</title>
  <link rel="stylesheet" href="/static/safevault.css">
</head>
<body>
  <header>
    <div>
      <strong>SafeVault 恢复中心</strong>
      <span class="warning">{{ local_warning }}</span>
    </div>
    <nav>
      <a href="/">恢复首页</a>
      <a href="/roots">保护目录</a>
      <a href="/storage">存储</a>
      <a href="/deleted">最近删除</a>
      <a href="/sandboxes" title="让 AI 工具先在项目副本中修改，确认后再应用">AI 修改保护</a>
      <a href="/maintenance" title="检查恢复数据健康状态并清理无引用数据">健康与清理</a>
      <a href="/export-import" title="查看、删除或导入外部备份">备份管理</a>
      <a href="/help">帮助</a>
    </nav>
  </header>
  <main>
    {% if message %}<p class="message">{{ message }}</p>{% endif %}
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <script src="/static/safevault.js"></script>
</body>
</html>
